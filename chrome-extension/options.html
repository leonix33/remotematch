<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>RemoteMatch Extension Settings</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 480px; margin: 40px auto; padding: 0 16px; }
      label { display: block; margin-top: 16px; font-weight: 600; }
      input { width: 100%; padding: 8px; margin-top: 4px; }
      button { margin-top: 20px; padding: 10px 16px; }
      p { color: #555; font-size: 14px; }
    </style>
  </head>
  <body>
    <h1>RemoteMatch Extension</h1>
    <p>
      Log in to RemoteMatch, open DevTools → Application → Local Storage → copy your
      <code>accessToken</code> value (or use the token from your auth session).
    </p>
    <label>API base URL<input id="apiBase" placeholder="https://remotelymatch.app" /></label>
    <label>Access token (JWT)<input id="accessToken" type="password" /></label>
    <label style="margin-top:20px;display:flex;align-items:center;gap:8px;font-weight:normal">
      <input id="linkedinWatch" type="checkbox" checked />
      Watch LinkedIn job search pages — auto-queue new listings &amp; notify phone
    </label>
    <button id="save">Save</button>
    <p id="status"></p>
    <script>
      chrome.storage.sync.get(['apiBase', 'accessToken', 'linkedinWatchEnabled'], (data) => {
        document.getElementById('apiBase').value = data.apiBase || 'https://remotelymatch.app';
        document.getElementById('accessToken').value = data.accessToken || '';
        document.getElementById('linkedinWatch').checked = data.linkedinWatchEnabled !== false;
      });
      document.getElementById('save').addEventListener('click', () => {
        chrome.storage.sync.set({
          apiBase: document.getElementById('apiBase').value.trim(),
          accessToken: document.getElementById('accessToken').value.trim(),
          linkedinWatchEnabled: document.getElementById('linkedinWatch').checked,
        }, () => {
          document.getElementById('status').textContent = 'Saved.';
        });
      });
    </script>
  </body>
</html>
