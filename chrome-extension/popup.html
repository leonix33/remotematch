<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>RemoteMatch Queue</title>
    <style>
      body { font-family: system-ui, sans-serif; width: 320px; margin: 0; padding: 16px; background: #0f172a; color: #e2e8f0; }
      h1 { font-size: 16px; margin: 0 0 12px; color: #5eead4; }
      label { display: block; font-size: 12px; color: #94a3b8; margin-top: 8px; }
      input, textarea { width: 100%; box-sizing: border-box; margin-top: 4px; padding: 8px; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: #f1f5f9; }
      button { margin-top: 12px; width: 100%; padding: 10px; border: none; border-radius: 8px; background: #14b8a6; color: #042f2e; font-weight: 600; cursor: pointer; }
      button:disabled { opacity: 0.5; }
      .msg { margin-top: 10px; font-size: 12px; }
      .ok { color: #5eead4; }
      .err { color: #fca5a5; }
      a { color: #5eead4; font-size: 12px; }
    </style>
  </head>
  <body>
    <h1>Send to RemoteMatch</h1>
    <p style="font-size:12px;color:#94a3b8">Queue this job page to your Apply Queue.</p>
    <label>Title<input id="title" /></label>
    <label>Company<input id="company" /></label>
    <label>URL<input id="url" readonly /></label>
    <button id="send">Add to queue</button>
    <p id="status" class="msg"></p>
    <p><a href="options.html" target="_blank">Settings (API URL + token)</a></p>
    <script src="popup.js"></script>
  </body>
</html>
