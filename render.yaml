services:
  - type: web
    name: remotematch
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_URL
        value: https://remotematch.onrender.com
      - key: CLIENT_ORIGIN
        value: https://remotematch.onrender.com
      - key: APP_NAME
        value: RemoteMatch
      - key: AGENT_HOME
        value: /app/agent-data
      - key: MONGODB_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false
