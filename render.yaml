services:
  - type: web
    name: remotematch
    env: docker
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_URL
        value: https://remotematch.onrender.com
      - key: CLIENT_ORIGIN
        value: https://remotematch.onrender.com
      - key: APP_NAME
        value: RemoteMatch
      - key: MONGODB_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: AGENT_HOME
        sync: false
