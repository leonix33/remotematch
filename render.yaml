services:
  - type: web
    # Render slug (legacy URL: remotematch.onrender.com). Product / domain: remotelymatch.app
    name: remotematch
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    # Upgrade to starter ($7/mo) in Render dashboard to eliminate cold starts
    plan: free
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Custom domain
      - key: APP_URL
        value: https://remotelymatch.app
      - key: CLIENT_ORIGIN
        value: https://remotelymatch.app,https://www.remotelymatch.app,https://remotematch.onrender.com
      - key: CUSTOM_DOMAIN
        value: remotelymatch.app
      - key: APP_NAME
        value: remotelymatch
      - key: VITE_APP_URL
        value: https://remotelymatch.app
      - key: VITE_APP_NAME
        value: remotelymatch
      - key: VITE_CUSTOM_DOMAIN
        value: remotelymatch.app
      - key: AGENT_HOME
        value: /app/agent-data
      - key: MONGODB_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      # Adzuna job feed — https://developer.adzuna.com
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false
      - key: ADZUNA_WHAT
        value: devops engineer remote
      - key: ADZUNA_WHERE
        value: remote
      - key: ADZUNA_MAX_DAYS_OLD
        value: "7"
      - key: RESEND_API_KEY
        sync: false
      # Uses noreply@remotelymatch.app automatically when CUSTOM_DOMAIN is set (see env.js)
      - key: EMAIL_FROM
        value: "remotelymatch <noreply@remotelymatch.app>"
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        value: mailto:leonix23@gmail.com
