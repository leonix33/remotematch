services:
  - type: web
    name: remotematch
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    # Upgrade to starter ($7/mo) in Render dashboard to eliminate cold starts
    plan: free
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Custom domain
      - key: APP_URL
        value: https://remotelymatch.app
      - key: CLIENT_ORIGIN
        value: https://remotelymatch.app,https://www.remotelymatch.app,https://remotematch.onrender.com
      - key: CUSTOM_DOMAIN
        value: remotelymatch.app
      - key: APP_NAME
        value: RemoteMatch
      - key: AGENT_HOME
        value: /app/agent-data
      - key: MONGODB_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: RemoteMatch <onboarding@resend.dev>
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        value: mailto:leonix23@gmail.com
